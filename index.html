<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Performance in Complex Systems Lab | Clemson University</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Official Clemson Colors */
            --clemson-orange: #F66733;
            --clemson-purple: #522D80;
            --clemson-regalia: #522D80;
            --clemson-dark-gray: #51504C;
            --clemson-light-gray: #C1C1C1;
            --clemson-white: #FFFFFF;
            
            /* Supporting Colors */
            --text-primary: #2C2A29;
            --text-secondary: #51504C;
            --text-light: #767676;
            --background-light: #F7F7F7;
            --border-light: #E5E5E5;
            --shadow-light: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.12);
            --shadow-heavy: rgba(0, 0, 0, 0.16);
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--clemson-white);
            font-size: 16px;
            font-weight: 400;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Roboto Slab', Georgia, serif;
            font-weight: 700;
            line-height: 1.2;
        }

        /* Top Utility Bar - Clemson Style */
        .top-bar {
            background: var(--clemson-purple);
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 2px solid var(--clemson-orange);
        }

        .top-bar-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .top-bar a {
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.3s;
            font-weight: 500;
        }

        .top-bar a:hover {
            opacity: 0.85;
            text-decoration: underline;
        }

        .top-bar .apply-btn {
            background: var(--clemson-orange);
            padding: 5px 15px;
            border-radius: 2px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .top-bar .apply-btn:hover {
            background: #E55600;
            text-decoration: none;
        }

        /* Main Header - Enhanced Clemson Style */
        header {
            background: var(--clemson-white);
            box-shadow: 0 2px 8px var(--shadow-light);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 90px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
        }

        .clemson-wordmark {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-family: 'Roboto Slab', Georgia, serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--clemson-purple);
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .clemson-wordmark .university {
            font-weight: 300;
            color: var(--text-secondary);
        }

        .paw-icon {
            color: var(--clemson-orange);
            font-size: 36px;
            margin-right: 10px;
        }

        .site-title {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            border-left: 2px solid var(--border-light);
            padding-left: 20px;
            margin-left: 20px;
            line-height: 1.3;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-button {
            background: transparent;
            color: var(--clemson-purple);
            border: 2px solid var(--clemson-purple);
            padding: 10px 20px;
            border-radius: 2px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-button:hover {
            background: var(--clemson-purple);
            color: white;
        }

        /* Navigation Bar - Cleaner Clemson Style */
        .nav-bar {
            background: var(--background-light);
            border-bottom: 4px solid var(--clemson-orange);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .main-nav {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .main-nav li {
            position: relative;
        }

        .main-nav a {
            display: block;
            padding: 18px 22px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            transition: all 0.3s;
            border-bottom: 4px solid transparent;
            margin-bottom: -4px;
        }

        .main-nav a:hover {
            background: var(--clemson-white);
            color: var(--clemson-orange);
        }

        .main-nav a.active {
            background: var(--clemson-white);
            color: var(--clemson-purple);
            border-bottom-color: var(--clemson-purple);
        }

        /* Hero Section - Modern Clemson Style */
        .hero {
            background: linear-gradient(135deg, var(--clemson-purple) 0%, #663399 100%);
            color: white;
            padding: 100px 0;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="white" fill-opacity="0.05" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,144C960,149,1056,139,1152,122.7C1248,107,1344,85,1392,74.7L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
            opacity: 0.3;
        }

        .hero-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 52px;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-family: 'Roboto Slab', Georgia, serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .hero-subtitle {
            font-size: 22px;
            margin-bottom: 35px;
            font-weight: 300;
            max-width: 800px;
            line-height: 1.5;
            opacity: 0.95;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border-radius: 2px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .btn-orange {
            background: var(--clemson-orange);
            color: white;
            border-color: var(--clemson-orange);
        }

        .btn-orange:hover {
            background: #E55600;
            border-color: #E55600;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(246, 103, 51, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-outline:hover {
            background: white;
            color: var(--clemson-purple);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.3);
        }

        /* Content Sections */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        section {
            padding: 80px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--clemson-purple);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            font-family: 'Roboto Slab', Georgia, serif;
        }

        .section-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 800px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Cards Grid - Modern Style */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--clemson-orange);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 12px 24px var(--shadow-medium);
            transform: translateY(-8px);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-icon {
            height: 180px;
            background: linear-gradient(135deg, var(--clemson-orange), #FF8C42);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .card-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
        }

        .card-content {
            padding: 30px;
        }

        .card h3 {
            font-size: 22px;
            font-weight: 700;
            color: var(--clemson-purple);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Roboto Slab', Georgia, serif;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* Featured Section */
        .featured-section {
            background: var(--background-light);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }

        .feature-item {
            background: white;
            padding: 35px;
            border-left: 4px solid var(--clemson-orange);
            box-shadow: 0 4px 12px var(--shadow-light);
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .feature-item:hover {
            box-shadow: 0 8px 24px var(--shadow-medium);
            transform: translateX(8px);
        }

        .feature-item h3 {
            color: var(--clemson-purple);
            font-size: 24px;
            margin-bottom: 15px;
            font-weight: 700;
            font-family: 'Roboto Slab', Georgia, serif;
        }

        .feature-item .icon {
            color: var(--clemson-orange);
            font-size: 40px;
            margin-bottom: 20px;
        }

        /* Stats Section */
        .stats-section {
            background: linear-gradient(135deg, var(--clemson-purple) 0%, #663399 100%);
            color: white;
            text-align: center;
            position: relative;
        }

        .stats-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="white" fill-opacity="0.03" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
            background-size: cover;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 50px;
            margin-top: 50px;
            position: relative;
            z-index: 1;
        }

        .stat-item {
            padding: 25px;
            transition: transform 0.3s ease;
        }

        .stat-item:hover {
            transform: scale(1.1);
        }

        .stat-number {
            font-size: 56px;
            font-weight: 700;
            color: var(--clemson-orange);
            margin-bottom: 10px;
            font-family: 'Roboto Slab', Georgia, serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stat-label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        /* Footer - Clemson Style */
        footer {
            background: var(--clemson-purple);
            color: white;
            padding: 50px 0 20px;
            position: relative;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--clemson-orange);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 50px;
            margin-bottom: 40px;
        }

        .footer-section h4 {
            font-size: 18px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.75px;
            color: var(--clemson-orange);
            font-family: 'Roboto Slab', Georgia, serif;
        }

        .footer-section ul {
            list-style: none;
        }

        .footer-section a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 6px 0;
            transition: all 0.3s;
            font-size: 14px;
        }

        .footer-section a:hover {
            color: var(--clemson-orange);
            transform: translateX(5px);
        }

        .footer-bottom {
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 25px;
            text-align: center;
            font-size: 14px;
            opacity: 0.9;
        }

        .footer-bottom a {
            color: var(--clemson-orange);
            text-decoration: none;
        }

        .footer-bottom a:hover {
            text-decoration: underline;
        }

        /* Page Content */
        .page {
            display: none;
            min-height: 60vh;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* People Grid */
        .people-filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            background: white;
            border: 2px solid var(--clemson-orange);
            color: var(--clemson-orange);
            border-radius: 2px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.75px;
            transition: all 0.3s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--clemson-orange);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(246, 103, 51, 0.3);
        }

        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 35px;
        }

        .person-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 12px var(--shadow-light);
        }

        .person-card:hover {
            box-shadow: 0 12px 24px var(--shadow-medium);
            transform: translateY(-8px);
        }

        .person-photo {
            height: 200px;
            background: linear-gradient(135deg, var(--clemson-orange), #FF8C42);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
            color: white;
        }

        .person-info {
            padding: 30px;
        }

        .person-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--clemson-purple);
            margin-bottom: 8px;
            font-family: 'Roboto Slab', Georgia, serif;
        }

        .person-role {
            color: var(--clemson-orange);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.75px;
        }

        .person-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .person-links a {
            color: var(--text-secondary);
            font-size: 20px;
            transition: all 0.3s;
        }

        .person-links a:hover {
            color: var(--clemson-orange);
            transform: scale(1.2);
        }

        /* Publications */
        .publications-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-box {
            padding: 12px 20px;
            border: 2px solid var(--border-light);
            border-radius: 2px;
            width: 400px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--clemson-orange);
            box-shadow: 0 0 0 3px rgba(246, 103, 51, 0.1);
        }

        .publication-item {
            background: white;
            padding: 30px;
            margin-bottom: 25px;
            border-left: 4px solid var(--clemson-orange);
            border-radius: 4px;
            box-shadow: 0 4px 12px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .publication-item:hover {
            box-shadow: 0 8px 24px var(--shadow-medium);
            transform: translateX(8px);
        }

        .pub-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--clemson-purple);
            margin-bottom: 10px;
            font-family: 'Roboto Slab', Georgia, serif;
        }

        .pub-authors {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .pub-venue {
            color: var(--clemson-orange);
            font-weight: 600;
            margin-bottom: 12px;
        }

        /* Research Areas */
        .research-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 35px;
        }

        .research-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.3s ease;
            border-top: 4px solid var(--clemson-orange);
            box-shadow: 0 4px 12px var(--shadow-light);
        }

        .research-card:hover {
            box-shadow: 0 12px 24px var(--shadow-medium);
            transform: translateY(-8px);
        }

        .research-icon {
            padding: 40px;
            text-align: center;
            background: var(--background-light);
        }

        .research-icon i {
            font-size: 56px;
            color: var(--clemson-purple);
        }

        .research-content {
            padding: 35px;
        }

        .research-card h3 {
            color: var(--clemson-purple);
            margin-bottom: 18px;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Roboto Slab', Georgia, serif;
        }

        /* News Timeline */
        .timeline {
            position: relative;
            padding-left: 50px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--clemson-orange);
        }

        .timeline-item {
            position: relative;
            background: white;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            box-shadow: 0 4px 12px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .timeline-item:hover {
            box-shadow: 0 8px 24px var(--shadow-medium);
            transform: translateX(8px);
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -38px;
            top: 30px;
            width: 16px;
            height: 16px;
            background: var(--clemson-orange);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 0 3px var(--clemson-orange);
        }

        .timeline-date {
            color: var(--clemson-purple);
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.75px;
        }

        .timeline-item h3 {
            color: var(--clemson-purple);
            margin-bottom: 12px;
            font-size: 22px;
            font-family: 'Roboto Slab', Georgia, serif;
        }

        /* Contact Form */
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: start;
        }

        .contact-info {
            background: var(--background-light);
            padding: 40px;
            border-radius: 4px;
            border-left: 4px solid var(--clemson-orange);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .contact-item i {
            color: var(--clemson-orange);
            font-size: 24px;
            width: 30px;
        }

        .contact-form {
            background: white;
            padding: 40px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            box-shadow: 0 4px 12px var(--shadow-light);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--clemson-purple);
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.75px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-light);
            border-radius: 2px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--clemson-orange);
            box-shadow: 0 0 0 3px rgba(246, 103, 51, 0.1);
        }

        .form-group textarea {
            height: 140px;
            resize: vertical;
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: var(--clemson-purple);
            cursor: pointer;
            padding: 5px;
        }

        /* Additional Clemson-specific styling */
        .orange-divider {
            height: 4px;
            background: var(--clemson-orange);
            margin: 50px auto;
            max-width: 120px;
            border-radius: 2px;
        }

        .highlight-box {
            background: var(--background-light);
            border-left: 4px solid var(--clemson-orange);
            padding: 25px;
            margin: 25px 0;
            border-radius: 4px;
        }

        .btn-purple {
            background: var(--clemson-purple);
            color: white;
            border-color: var(--clemson-purple);
        }

        .btn-purple:hover {
            background: #663399;
            border-color: #663399;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(82, 45, 128, 0.3);
        }

        /* Loading Animation */
        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-nav a {
                padding: 15px 18px;
                font-size: 13px;
            }

            .hero h1 {
                font-size: 42px;
            }

            .section-title {
                font-size: 36px;
            }

            .cards-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .top-bar-content {
                font-size: 12px;
            }

            .top-bar-left {
                display: none;
            }

            .header-main {
                height: 75px;
            }

            .clemson-wordmark {
                font-size: 22px;
            }

            .site-title {
                display: none;
            }

            .mobile-menu {
                display: block;
            }

            .search-button {
                display: none;
            }

            .nav-bar {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: white;
                box-shadow: 0 5px 15px var(--shadow-medium);
                z-index: 999;
            }

            .nav-bar.active {
                display: block;
            }

            .main-nav {
                flex-direction: column;
            }

            .main-nav a {
                border-bottom: 1px solid var(--border-light);
                border-left: 4px solid transparent;
                margin-bottom: 0;
            }

            .main-nav a:hover,
            .main-nav a.active {
                border-left-color: var(--clemson-orange);
                border-bottom-color: var(--border-light);
            }

            .hero {
                padding: 70px 0;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero-subtitle {
                font-size: 18px;
            }

            .btn-group {
                flex-direction: column;
                align-items: stretch;
            }

            .cards-grid,
            .feature-grid,
            .stats-grid,
            .people-grid,
            .research-grid {
                grid-template-columns: 1fr;
            }

            .contact-grid {
                grid-template-columns: 1fr;
            }

            .footer-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .search-box {
                width: 100%;
            }

            .publications-controls {
                flex-direction: column;
                align-items: stretch;
            }

            section {
                padding: 60px 0;
            }

            .timeline {
                padding-left: 30px;
            }

            .timeline::before {
                left: 10px;
            }

            .timeline-item::before {
                left: -28px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 26px;
            }

            .section-title {
                font-size: 28px;
            }

            .btn {
                padding: 12px 24px;
                font-size: 13px;
            }

            .stat-number {
                font-size: 42px;
            }

            .person-photo {
                height: 150px;
                font-size: 54px;
            }
        }

        /* Print Styles */
        @media print {
            .top-bar,
            .mobile-menu,
            .search-button,
            .nav-bar {
                display: none;
            }

            body {
                font-size: 12pt;
            }

            .hero {
                padding: 30px 0;
                background: none;
                color: var(--text-primary);
            }

            .hero h1 {
                color: var(--clemson-purple);
            }

            .btn-group {
                display: none;
            }
        }
